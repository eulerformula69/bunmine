<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/favicon.ico" sizes="any">
<meta charset="UTF-8" />
<title>Bunmine</title>
<link rel="stylesheet" href="player.css" />
</head>
<body>
<div id="main">

<div id="mpToastContainer" class="mp-toast-container"></div>

<button id="addKnownBasicBtn" class="add-known-basic-btn hidden" type="button" data-i18n="addToKnownBasic">
  Add to known-basic
</button>

<!-- WIP add custom button for adding card like in yomitan
<button id="addCardToDeck" class="copy-for-yomitan-btn hidden" type="button" data-i18n="addCardToDeck">
  Add card to deck
</button>
-->

<div id="settingsModal" class="hidden">
  <div class="settings-window">
    
    <aside class="settings-tabs">
      <h2 data-i18n="settings">Settings</h2>

      <button class="settings-tab active" data-settings-tab="card" data-i18n="cardSettings">
        Anki Card Settings
      </button>

      <button class="settings-tab" data-settings-tab="visuals" data-i18n="visuals">
        Visuals
      </button>

      <button class="settings-tab" data-settings-tab="anki" data-i18n="ankiIntegration">
        Anki Integration
      </button>
    </aside>

    <section class="settings-content">

      <div class="settings-page active" data-settings-page="card">
        <h2 data-i18n="cardSettings">Anki Card Settings</h2>

        <label data-i18n="offset">Offset (Start / End):</label>
        <div class="settings-row">
          <input type="number" id="subOffsetStart" value="0" step="0.1">
          <input type="number" id="subOffsetEnd" value="0" step="0.1">
        </div>

        <label data-i18n="subDepth">Subtitle context:</label>
        <input type="number" id="subDepth" value="1" min="1" max="5">

        <label data-i18n="audioVol">Audio Volume:</label>
        <input type="number" id="audioVol" value="1.0" step="0.1" min="0" max="2.0">

        <button id="previewAudioBtn" class="settings-action-btn" data-i18n="previewAudio">
          Preview Audio
        </button>

        <label data-i18n="screenshotMode">Screenshot Mode:</label>
        <select id="screenshotMode">
          <option value="subtitle" data-i18n="ssSubtitle">Subtitle Time</option>
          <option value="current" data-i18n="ssCurrent">Current Frame</option>
          <option value="webp" data-i18n="ssWebp">Animated WebP</option>
        </select>
		
		<div class="settings-checkbox-row">
		  <label for="includeImageSubtitle" data-i18n="includeImageSubtitle">
			Add subtitle to image
		  </label>
		  <input type="checkbox" id="includeImageSubtitle" checked>
		</div>

      </div>
	  


      <div class="settings-page" data-settings-page="visuals">
        <h2 data-i18n="visuals">Visuals</h2>

        <button id="toggleSubs" class="settings-action-btn" data-i18n="hideSubs">
          Hide Subs
        </button>

        <label data-i18n="fontSize">Font size:</label>
        <input type="range" id="fontSizeRange" class="slider" min="20" max="80" step="1" value="40">

        <label data-i18n="globalSubDelay">Global Sub Delay (s):</label>
        <input type="number" id="globalSubDelay" value="0" step="0.1">

        <label data-i18n="interfaceLang">Interface Language:</label>
        <select id="interfaceLangSelect"></select>
		
<div class="settings-checkbox-row">
  <label for="subtitleHighlightEnabled" data-i18n="subtitleHighlightEnabled">
    Highlight subtitle words
  </label>
  <input type="checkbox" id="subtitleHighlightEnabled" checked>
</div>

<label data-i18n="highlightColors">Highlight colors:</label>

<div class="settings-row">
  <label>
    <span data-i18n="highlightStatusNew">New</span>
    <input type="color" id="highlightColorNew" value="#77b7d8">
  </label>
  <label>
    <span data-i18n="highlightStatusLearning">Learning</span>
    <input type="color" id="highlightColorLearning" value="#ff8a3d">
  </label>
</div>

<div class="settings-row">
  <label>
    <span data-i18n="highlightStatusYoung">Young</span>
    <input type="color" id="highlightColorYoung" value="#7ec77a">
  </label>
  <label>
    <span data-i18n="highlightStatusMature">Mature</span>
    <input type="color" id="highlightColorMature" value="#2f9d4f">
  </label>
</div>

<div class="settings-row">
  <label>
    <span data-i18n="highlightStatusSuspended">Suspended</span>
    <input type="color" id="highlightColorSuspended" value="#ffde4a">
  </label>
  <label>
    <span data-i18n="highlightStatusUnknown">Unknown</span>
    <input type="color" id="highlightColorUnknown" value="#ffffff">
  </label>
</div>
		
      </div>

      <div class="settings-page" data-settings-page="anki">
        <h2 data-i18n="ankiIntegration">Anki Integration</h2>

        <label data-i18n="ankiURL">AnkiConnect URL:</label>
        <input type="text" id="ankiUrl" value="http://localhost:8765">

        <label data-i18n="deckName">Deck Name:</label>
        <input type="text" id="deckName" value="Mining Deck">

        <label data-i18n="sentenceField">Sentence Field:</label>
        <input type="text" id="sentenceField" value="Sentence">
		
		<label data-i18n="sentenceFuriganaField">Sentence Furigana Field:</label>
		<input type="text" id="sentenceFuriganaField" value="SentenceReading">

        <label data-i18n="pictureField">Picture Field:</label>
        <input type="text" id="pictureField" value="Picture">

        <label data-i18n="audioField">Audio Field:</label>
        <input type="text" id="audioField" value="SentenceAudio">
		
		<!-- тут сделать нормальный ввод для колоды подсветки и полей -->
		<label data-i18n="highlightDecks">Highlight Decks:</label>
		<input type="text" id="highlightDeckNames" value="" placeholder="新語帳, Mining Deck, Japanese::Known">

		<label data-i18n="highlightWordField">Highlight Word Field:</label>
		<input type="text" id="highlightWordField" value="Word">

		<button id="refreshAnkiHighlighterBtn" class="settings-action-btn" data-i18n="refreshHighlightWords">
		  Refresh Highlight Words
		</button>		

      </div>

      <div class="settings-footer">
        <button id="saveSettingsBtn" data-i18n="saveSettings">
          Save Settings
        </button>

        <button id="deleteVideoBtn" data-i18n="clear">
          Clear
        </button>

        <button id="closeSettingsBtn" data-i18n="closeSettings">
          Close
        </button>
      </div>

    </section>
  </div>
</div>

<div id="videoPickerModal" class="hidden">
  <div class="video-picker-window">
    <h2 data-i18n="chooseVideo">Choose video</h2>

    <div id="videoPickerList" class="video-picker-list"></div>

    <div class="video-picker-footer">
      <button id="videoPickerCancelBtn" type="button" data-i18n="dropNewFile">
        Drop new file
      </button>
    </div>
  </div>
</div>

<div id="dropzone">
  <h2 data-i18n="dropText">Drop video and subtitles (.srt .ass) here</h2>
  <p><span data-i18n="orText">or</span><span id="clickToUpload" data-i18n="chooseFiles" style="color: #8800ff; cursor: pointer; text-decoration: underline;">choose files</span></p>
  
  <input type="file" id="multiInput" class="hidden-input" multiple accept="video/*,.srt,.ass">
</div>

  <div id="videoContainer">
    <video id="video"></video>

<div id="controls">
  <div class="controls-row" style="margin-bottom: 5px;">
    <input type="range" id="progress" class="slider" value="0" min="0" max="100">
  </div>
  
  <div class="controls-row" style="justify-content: space-between;">
    <div style="display: flex; gap: 10px; align-items: center;">
      <button id="playPause" type="button">▶</button>
      <input type="range" id="volume" class="slider" min="0" max="1" step="0.01" value="1" style="width: 60px;">
      <span id="time" style="font-size: 12px;">0:00 / 0:00</span>
    </div>
 
<div class="mining-row">

	<div id="targetNoteDropdown" class="note-dropdown">
	  <button id="targetNoteButton" type="button" class="note-dropdown-btn" title="Last added card">
		<span id="targetNoteButtonText">🕘</span>
		<span class="note-dropdown-arrow">▾</span>
	  </button>

	  <div id="targetNoteMenu" class="note-dropdown-menu hidden"></div>
	</div>

	<select id="targetNoteSelect" hidden>
	  <option value="" data-i18n="lastAdded" title="Last added card">🕘</option>
	</select>

  <button id="ankiAllBtn" class="primary-action" data-i18n="updateCard">
    Update Card
  </button>

</div>

    <div style="display: flex; gap: 5px; align-items: center;">
      <button id="prevSubBtn">◀</button>
      <button id="nextSubBtn">▶</button>
		<select id="audioTrackSelect">
		  <option value="default" data-i18n="defaultAudio">DEFAULT</option>
		</select>
		
	<button id="fullscreenBtn" type="button" class="icon-btn" title="Fullscreen" aria-label="Fullscreen">
	  ⛶
	</button>

	<button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">
	  ⚙
	</button>
	  
    </div>
  </div>
  
</div>

    <div id="subtitleOverlay"></div>
    <img id="screenshotPreview" src="" alt="" hidden>
  </div>
</div>

<div id="resizer"></div>
<div id="sidebar"></div>

<script src="player.i18n.js" defer></script>
<script src="player.api.js" defer></script>
<script src="player.state.js" defer></script>
<script src="player.ui.js" defer></script>
<script src="player.video.js" defer></script>
<script src="libs/kuromoji/kuromoji.js" defer></script>
<script src="player.japanese-tokenizer.js" defer></script>
<script src="player.subtitles-highlighter.js" defer></script>
<script src="player.anki-highlighter.js" defer></script>
<script src="player.subtitles.js" defer></script>
<script src="player.js" defer></script>
<script src="player.audio.js" defer></script>
<script src="player.settings.js" defer></script>



</body>
</html>
