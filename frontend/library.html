<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bunmine Library</title>
  <link rel="icon" href="icons/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="styles/library.css" />
</head>
<body>
<main class="library-page">
  <div class="library-shell">
    <header class="library-header">
      <div>
        <h1 data-i18n="libraryTitle">Bunmine Library</h1>
        <p id="librarySummary" class="library-summary" data-i18n="loading">Loading...</p>
      </div>

      <div class="library-actions">
        <button id="scanLibraryBtn" type="button" data-i18n="scanLibrary">Scan library</button>
        <a class="player-link" href="/" data-i18n="player">Player</a>
      </div>
    </header>

    <section id="seriesGrid" class="series-grid"></section>

	<div id="seriesModal" class="library-modal hidden">
	  <section id="seriesPanel" class="series-panel" role="dialog" aria-modal="true" aria-labelledby="seriesTitle">
		<div class="series-panel-header series-detail-header">
		  <div>
			<h2 id="seriesTitle"></h2>
			<p id="seriesStats"></p>
		  </div>

		  <div class="series-panel-actions">
			<button id="exportVocabularyBtn" type="button" data-i18n="exportVocabulary">Export vocabulary report</button>
			<button id="downloadMissingSubtitlesBtn" type="button" data-i18n="downloadMissingJpSubs">Download missing JP subs</button>
			<button id="changeSeriesCoverBtn" type="button" data-i18n="changeCover">Change cover</button>
			<button id="relinkSeriesFilesBtn" type="button" data-i18n="relinkFiles">Relink files</button>
			<button id="deleteSeriesBtn" class="danger-button" type="button" data-i18n="deleteSeries">Delete</button>
			<button id="closeSeriesPanelBtn" type="button" data-i18n="close">Close</button>
		  </div>
		</div>

		<div id="episodeList" class="episode-list"></div>
	  </section>
	</div>
  </div>


<div id="bulkSubtitleModal" class="library-modal hidden">
  <section class="cover-panel bulk-subtitle-panel" role="dialog" aria-modal="true" aria-labelledby="bulkSubtitleModalTitle">
    <div class="series-panel-header">
      <div>
        <h2 id="bulkSubtitleModalTitle" data-i18n="downloadMissingJapaneseSubtitles">Download missing Japanese subtitles</h2>
        <p id="bulkSubtitleModalSubtitle"></p>
      </div>
      <button id="closeBulkSubtitleModalBtn" type="button" data-i18n="close">Close</button>
    </div>

    <label class="cover-search-label" for="bulkSubtitleSearchInput" data-i18n="subtitleSearchTitle">Subtitle search title (query)</label>
    <div class="cover-search-row">
      <input id="bulkSubtitleSearchInput" type="text" />
      <button id="bulkSubtitleSearchBtn" type="button" data-i18n="search">Search</button>
    </div>

    <div id="bulkSubtitleStatus" class="cover-message" data-i18n="subtitleQueryHint">Edit the Jimaku query, then press Search.</div>
    <div id="bulkSubtitleSets" class="bulk-subtitle-sets"></div>
    <div id="bulkSubtitleList" class="bulk-subtitle-list"></div>

    <div class="bulk-subtitle-actions">
      <button id="confirmBulkSubtitleDownloadBtn" type="button" disabled data-i18n="downloadSelected">Download selected</button>
      <button id="cancelBulkSubtitleDownloadBtn" type="button" data-i18n="cancel">Cancel</button>
    </div>
  </section>
</div>

<div id="vocabularyReportModal" class="library-modal hidden">
  <section class="cover-panel vocabulary-report-panel" role="dialog" aria-modal="true" aria-labelledby="vocabularyReportTitle">
    <div class="series-panel-header"><h2 id="vocabularyReportTitle" data-i18n="exportVocabulary">Export vocabulary report</h2><button id="closeVocabularyReportBtn" type="button" data-i18n="close">Close</button></div>
    <p data-i18n="reportScopeEntire">Scope: Entire series</p>
    <fieldset><legend data-i18n="includeStatuses">Include statuses</legend>
      <label><input name="reportStatus" value="not_in_anki" type="checkbox" checked> <span data-i18n="statusUnknown">Unknown / not in Anki</span></label>
      <label><input name="reportStatus" value="new" type="checkbox" checked> New</label><label><input name="reportStatus" value="learning" type="checkbox" checked> Learning</label>
      <label><input name="reportStatus" value="young" type="checkbox" checked> Young</label><label><input name="reportStatus" value="mature" type="checkbox"> Mature</label>
      <label><input name="reportStatus" value="suspended" type="checkbox"> Suspended</label><label><input name="reportStatus" value="known_basic" type="checkbox"> Known Basic</label>
    </fieldset>
    <fieldset><legend data-i18n="reportTokenTypes">Token types</legend>
      <label><input id="reportIncludeParticles" type="checkbox"> <span data-i18n="includeParticles">Include particles</span></label>
      <label><input id="reportIncludeAuxiliaryForms" type="checkbox"> <span data-i18n="includeAuxiliaryForms">Include auxiliary and conversational forms</span></label>
    </fieldset>
    <fieldset><legend data-i18n="reportSheets">Sheets</legend>
      <label><input name="reportSheet" value="summary" type="checkbox" checked> Vocabulary Summary</label><label><input name="reportSheet" value="occurrences" type="checkbox" checked> Occurrences</label><label><input name="reportSheet" value="statistics" type="checkbox" checked> Statistics</label>
    </fieldset>
    <p id="vocabularyReportStatus" class="cover-message"></p>
    <div class="bulk-subtitle-actions"><button id="confirmVocabularyReportBtn" type="button" data-i18n="prepareReport">Prepare report</button><button id="cancelVocabularyReportBtn" type="button" data-i18n="cancel">Cancel</button></div>
  </section>
</div>

<div id="subtitleModal" class="library-modal hidden">
  <section class="cover-panel" role="dialog" aria-modal="true" aria-labelledby="subtitleModalTitle">
    <div class="series-panel-header">
      <div>
        <h2 id="subtitleModalTitle" data-i18n="findJapaneseSubtitles">Find Japanese subtitles</h2>
        <p id="subtitleModalSubtitle"></p>
      </div>
      <button id="closeSubtitleModalBtn" type="button" data-i18n="close">Close</button>
    </div>

    <div class="cover-search-row">
      <input id="subtitleSearchInput" type="text" />
      <button id="subtitleSearchBtn" type="button" data-i18n="search">Search</button>
    </div>

    <div id="subtitleResults" class="cover-results subtitle-results"></div>
  </section>
</div>

<div id="coverModal" class="library-modal hidden">
  <section class="cover-panel" role="dialog" aria-modal="true" aria-labelledby="coverModalTitle">
    <div class="series-panel-header">
      <div>
        <h2 id="coverModalTitle" data-i18n="findCover">Find cover</h2>
        <p id="coverModalSubtitle"></p>
      </div>
      <button id="closeCoverModalBtn" type="button" data-i18n="close">Close</button>
    </div>

    <div class="cover-search-row">
      <input id="coverSearchInput" type="text" />
      <button id="coverSearchBtn" type="button" data-i18n="search">Search</button>
    </div>

    <div id="coverResults" class="cover-results"></div>
  </section>
</div>  
  
</main>

  <script type="module" src="/dist/js/library-bootstrap.js"></script>
</body>
</html>
